<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>פסאו — הזמנות ספקים</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הזמנות">
<meta name="theme-color" content="#0C0C0E">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔶</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0C0E;--card:#1A1A1F;--card-active:#22222A;--border:#2A2A33;--text:#E8E8EC;--dim:#7A7A88;--accent:#C4A265;--accent-dim:rgba(196,162,101,0.15);--green:#4ADE80;--red:#F87171}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* Loading */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px}
.loader .spin{width:36px;height:36px;border:3px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Index */
#indexView{padding:16px 12px 40px;display:none}
#indexView h1{font-size:26px;font-weight:900;color:var(–accent);text-align:center;margin:20px 0 4px}
.idx-sub{text-align:center;color:var(–dim);font-size:13px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s}
.card:active{transform:scale(.97);border-color:var(–accent)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-emoji{font-size:28px}
.card-count{font-size:11px;color:var(–dim);background:var(–card-active);padding:2px 8px;border-radius:20px}
.card-name{font-size:14px;font-weight:700;margin-bottom:2px;line-height:1.3}
.card-contact{font-size:11px;color:var(–dim)}
.card-days{font-size:10px;color:var(–accent);margin-top:4px;opacity:.8}

/* Supplier View */
#supplierView{padding:0 0 120px;display:none}
.s-header{position:sticky;top:0;z-index:10;background:var(–bg);padding:14px 16px 10px;border-bottom:1px solid var(–border)}
.s-back{background:none;border:none;color:var(–accent);font-size:14px;font-family:inherit;cursor:pointer;margin-bottom:6px;padding:0}
.s-title{font-size:22px;font-weight:900}
.s-meta{font-size:12px;color:var(–dim);margin-top:2px}
.s-contact-bar{display:flex;gap:8px;margin-top:8px}
.s-contact-bar a,.s-contact-bar button{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:6px 14px;font-size:12px;color:var(–text);text-decoration:none;font-family:inherit;cursor:pointer}
.s-contact-bar a:active,.s-contact-bar button:active{background:var(–accent-dim)}
.cat-title{font-size:13px;font-weight:700;color:var(–accent);padding:14px 16px 6px;position:sticky;top:96px;background:var(–bg);z-index:5}
.item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(–border);gap:12px;transition:background .1s}
.item.active{background:var(–accent-dim)}
.item-check{width:22px;height:22px;border-radius:6px;border:2px solid var(–border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px;color:transparent}
.item.active .item-check{border-color:var(–accent);background:var(–accent);color:#000}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-unit{font-size:11px;color:var(–dim)}
.item-qty{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(–border);background:var(–card);color:var(–text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit}
.qty-btn:active{background:var(–accent-dim)}
.qty-val{font-size:16px;font-weight:700;min-width:24px;text-align:center}

/* Bottom Bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(–bg);border-top:1px solid var(–border);padding:10px 16px;display:none;gap:8px;z-index:20}
.bottom-bar.show{display:flex}
.btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.btn-wa{background:#25D366;color:#fff}
.btn-copy{background:var(–card);color:var(–text);border:1px solid var(–border)}
.btn-reset{background:var(–card);color:var(–red);border:1px solid var(–border);flex:.5}

/* Badge */
.badge{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(–accent);color:#000;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:25}
.badge.show{opacity:1}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(–card);color:var(–text);padding:8px 20px;border-radius:20px;font-size:13px;border:1px solid var(–border);opacity:0;transition:opacity .3s;pointer-events:none;z-index:30}
.toast.show{opacity:1}

/* Dark mode toggle area */
.mode-toggle{position:absolute;top:20px;left:16px;background:none;border:none;font-size:20px;cursor:pointer;padding:4px}
</style>

</head>
<body>

<div id="loading" class="loader">
  <div class="spin"></div>
  <span style="color:var(--dim);font-size:13px">טוען ספקים...</span>
</div>

<div id="indexView">
  <h1>פסאו גג על הים</h1>
  <p class="idx-sub">הזמנות ספקים</p>
  <div class="grid" id="supplierGrid"></div>
</div>

<div id="supplierView">
  <div class="s-header">
    <button class="s-back" id="backBtn">→ חזרה</button>
    <div class="s-title" id="sTitle"></div>
    <div class="s-meta" id="sMeta"></div>
    <div class="s-contact-bar" id="sContact"></div>
  </div>
  <div id="itemsList"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button class="btn btn-wa" id="btnWa">📲 וואטסאפ</button>
  <button class="btn btn-copy" id="btnCopy">📋 העתק</button>
  <button class="btn btn-reset" id="btnReset">↩</button>
</div>

<div class="badge" id="badge"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vzeowbriddhvhpishmhn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6ZW93YnJpZGRodmhwaXNobWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTAyNDUsImV4cCI6MjA4ODM4NjI0NX0.PWvjFj41l0wB9awroZdDsMhCJ0yJXdrf1-k-45n0Rwk';

const EMOJI_MAP = {
  'food': '🍽️', 'אלכוהול': '🥃', 'יינות': '🍷', 'תבלינים': '🌶️', 'equipment': '🧹'
};
const DAY_MAP = {sun:'א׳',mon:'ב׳',tue:'ג׳',wed:'ד׳',thu:'ה׳',fri:'ו׳',sat:'ש׳'};

let suppliers = [];
let products = [];
let currentSupplier = null;
let state = {}; // { productId: qty }

async function sbFetch(table, query='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function loadData() {
  try {
    const [s, p] = await Promise.all([
      sbFetch('suppliers', 'active=eq.true&order=name.asc'),
      sbFetch('products', 'active=eq.true&discontinued=not.eq.true&order=category.asc,name.asc')
    ]);
    suppliers = s;
    products = p;
    renderIndex();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<span style="color:var(--red)">שגיאה בטעינה. בדוק חיבור אינטרנט.</span>';
  }
}

function renderIndex() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('indexView').style.display = 'block';
  
  const grid = document.getElementById('supplierGrid');
  // Only show suppliers that have products
  const withProducts = suppliers.filter(s => products.some(p => p.supplier_id === s.id));
  
  grid.innerHTML = withProducts.map(s => {
    const count = products.filter(p => p.supplier_id === s.id).length;
    const emoji = EMOJI_MAP[s.category] || '📦';
    const days = s.order_days ? s.order_days.map(d => DAY_MAP[d]||d).join(' ') : '';
    const cutoff = s.order_cutoff ? s.order_cutoff.slice(0,5) : '';
    const dayLine = days ? `${days}${cutoff ? ' עד '+cutoff : ''}` : '';
    return `
      <div class="card" onclick="openSupplier('${s.id}')">
        <div class="card-top">
          <span class="card-emoji">${emoji}</span>
          <span class="card-count">${count}</span>
        </div>
        <div class="card-name">${s.name}</div>
        <div class="card-contact">${s.contact_name||''}</div>
        ${dayLine ? `<div class="card-days">${dayLine}</div>` : ''}
      </div>`;
  }).join('');
}

function openSupplier(id) {
  currentSupplier = suppliers.find(s => s.id === id);
  if (!currentSupplier) return;
  
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('supplierView').style.display = 'block';
  document.getElementById('bottomBar').classList.add('show');
  
  document.getElementById('sTitle').textContent = currentSupplier.name;
  const days = currentSupplier.order_days ? currentSupplier.order_days.map(d => DAY_MAP[d]||d).join(' ') : '';
  const cutoff = currentSupplier.order_cutoff ? currentSupplier.order_cutoff.slice(0,5) : '';
  document.getElementById('sMeta').textContent = days ? `${days}${cutoff ? ' עד '+cutoff : ''}` : '';
  
  // Contact buttons
  const contactBar = document.getElementById('sContact');
  let contactHTML = '';
  const phone = cleanPhone(currentSupplier.phone);
  if (phone) {
    contactHTML += `<a href="tel:${phone}">📞 חייג</a>`;
  }
  contactBar.innerHTML = contactHTML;
  
  renderItems();
}

function renderItems() {
  const items = products.filter(p => p.supplier_id === currentSupplier.id);
  const cats = {};
  items.forEach(i => {
    const cat = i.category || 'כללי';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(i);
  });
  
  let html = '';
  for (const [cat, catItems] of Object.entries(cats)) {
    html += `<div class="cat-title">${cat}</div>`;
    catItems.forEach(item => {
      const qty = state[item.id] || 0;
      const isActive = qty > 0;
      html += `
        <div class="item ${isActive?'active':''}" id="row-${item.id}">
          <div class="item-check" onclick="toggleItem('${item.id}')">${isActive?'✓':''}</div>
          <div class="item-info" onclick="toggleItem('${item.id}')">
            <div class="item-name">${item.name}</div>
            <div class="item-unit">${item.unit||'יח׳'}</div>
          </div>
          <div class="item-qty">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
            <span class="qty-val">${qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
          </div>
        </div>`;
    });
  }
  document.getElementById('itemsList').innerHTML = html;
  updateBadge();
}

function toggleItem(id) {
  if (state[id]) {
    delete state[id];
  } else {
    state[id] = 1;
  }
  renderItems();
}

function changeQty(id, delta) {
  const current = state[id] || 0;
  const next = current + delta;
  if (next <= 0) {
    delete state[id];
  } else {
    state[id] = next;
  }
  renderItems();
}

function updateBadge() {
  const count = Object.keys(state).length;
  const badge = document.getElementById('badge');
  if (count > 0) {
    badge.textContent = `${count} פריטים בהזמנה`;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function buildText() {
  const lines = [];
  const items = products.filter(p => p.supplier_id === currentSupplier.id);
  items.forEach(item => {
    if (state[item.id]) {
      lines.push({ name: item.name, qty: state[item.id], unit: item.order_unit || item.unit || 'יח׳' });
    }
  });
  if (!lines.length) return null;
  
  const d = new Date();
  const dateStr = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  let text = `הזמנה מפסאו גג על הים\nתאריך: ${dateStr}\n\n`;
  lines.forEach(l => {
    text += `• ${l.name} — ${l.qty} ${l.unit}\n`;
  });
  text += `\nתודה`;
  return text;
}

function cleanPhone(ph) {
  if (!ph) return '';
  let clean = ph.replace(/[^0-9+]/g, '');
  if (clean.startsWith('0') && !clean.startsWith('+')) {
    clean = '972' + clean.slice(1);
  }
  if (clean.startsWith('+')) clean = clean.slice(1);
  return clean;
}

document.getElementById('btnWa').onclick = () => {
  const text = buildText();
  if (!text) return toast('סמן לפחות פריט אחד');
  const phone = cleanPhone(currentSupplier.phone);
  const encoded = encodeURIComponent(text);
  const url = phone ? `https://wa.me/${phone}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
  window.open(url, '_blank');
};

document.getElementById('btnCopy').onclick = () => {
  const text = buildText();
  if (!text) return toast('סמן לפחות פריט אחד');
  navigator.clipboard.writeText(text).then(() => toast('הועתק ✓'));
};

document.getElementById('btnReset').onclick = () => {
  for (const k in state) delete state[k];
  renderItems();
  toast('אופס');
};

document.getElementById('backBtn').onclick = () => {
  document.getElementById('supplierView').style.display = 'none';
  document.getElementById('bottomBar').classList.remove('show');
  document.getElementById('indexView').style.display = 'block';
  for (const k in state) delete state[k];
  currentSupplier = null;
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// Init
loadData();
</script>

</body>
</html>
