<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="dark">
<title>פסאו — הזמנות ספקים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap');

/* colors hardcoded */

/* light mode removed - dark only */

html, body {
background: #18181b !important;
color: #fafafa !important;
color-scheme: dark;
}

.theme-btn {
background: #2c2c30;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 8px;
color: #a1a1aa;
font-size: 18px;
width: 34px; height: 34px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Heebo’, sans-serif;
background: #18181b;
color: #fafafa;
min-height: 100vh;
max-width: 480px;
margin: 0 auto;
font-size: 14px;
line-height: 1.4;
}

/* HEADER */
.header {
position: sticky;
top: 0;
z-index: 100;
background: #18181b;
border-bottom: 1px solid rgba(255,255,255,0.07);
padding: 12px 16px 0;
}

.header-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
}

.logo { font-size: 17px; font-weight: 700; color: #fafafa; letter-spacing: -0.3px; }
.logo span { color: #3b82f6; }

/* TABS */
.tabs {
display: flex;
gap: 0;
border-bottom: 1px solid rgba(255,255,255,0.07);
margin: 0 -16px;
padding: 0 16px;
}

.tab {
padding: 10px 16px;
font-size: 13px;
font-weight: 500;
color: #a1a1aa;
cursor: pointer;
border-bottom: 2px solid transparent;
transition: all 0.18s;
white-space: nowrap;
}

.tab.active {
color: #3b82f6;
border-bottom-color: #3b82f6;
}

/* SEARCH */
.search-wrap {
padding: 10px 16px;
background: #18181b;
border-bottom: 1px solid rgba(255,255,255,0.07);
}

.search-input {
width: 100%;
background: #232326;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 10px;
padding: 9px 14px;
font-size: 14px;
color: #fafafa;
font-family: ‘Heebo’, sans-serif;
outline: none;
direction: rtl;
}

.search-input::placeholder { color: #52525b; }
.search-input:focus { border-color: #3b82f6; }

/* CATEGORY PILLS */
.pills {
display: flex;
gap: 8px;
padding: 10px 16px;
overflow-x: auto;
scrollbar-width: none;
background: #18181b;
border-bottom: 1px solid rgba(255,255,255,0.07);
}
.pills::-webkit-scrollbar { display: none; }

.pill {
padding: 5px 13px;
border-radius: 20px;
font-size: 12px;
font-weight: 500;
white-space: nowrap;
cursor: pointer;
border: 1px solid rgba(255,255,255,0.12);
color: #a1a1aa;
background: transparent;
transition: all 0.15s;
}
.pill.active {
background: rgba(59,130,246,0.15);
border-color: #3b82f6;
color: #3b82f6;
}

/* MAIN CONTENT */
.main { padding-bottom: 90px; }

/* === ORDER TAB === */
.supplier-block { border-bottom: 1px solid rgba(255,255,255,0.07); }

.supplier-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px;
cursor: pointer;
background: #232326;
user-select: none;
border-right: 3px solid transparent;
transition: border-color 0.15s;
}
.supplier-header:has(.badge-accent) {
border-right-color: #3b82f6;
}

.supplier-header:active { background: #2c2c30; }

.sup-left { flex: 1; min-width: 0; }
.sup-name { font-size: 15px; font-weight: 600; color: #fafafa; }
.sup-meta { font-size: 12px; color: #a1a1aa; margin-top: 2px; }

.sup-right { display: flex; align-items: center; gap: 8px; }

.badge {
font-size: 11px;
padding: 2px 8px;
border-radius: 10px;
font-weight: 600;
}
.badge-green { background: rgba(34,197,94,0.13); color: #22c55e; }
.badge-accent { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-amber { background: rgba(245,158,11,0.13); color: #f59e0b; }

.chevron {
font-size: 10px;
color: #52525b;
transition: transform 0.2s;
flex-shrink: 0;
}
.chevron.open { transform: rotate(90deg); }

.products { display: none; }
.products.open { display: block; }

.product-row {
display: flex;
align-items: center;
padding: 11px 16px;
border-bottom: 1px solid rgba(255,255,255,0.07);
gap: 10px;
background: #18181b;
}
.product-row:last-child { border-bottom: none; }

.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 13px; color: #fafafa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-sub { font-size: 11px; color: #52525b; margin-top: 2px; }
.prod-price { font-size: 13px; font-weight: 600; color: #a1a1aa; white-space: nowrap; min-width: 60px; text-align: center; }

.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn {
width: 30px; height: 30px;
border-radius: 8px;
background: #2c2c30;
border: 1px solid rgba(255,255,255,0.12);
color: #fafafa;
font-size: 18px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
line-height: 1;
font-weight: 400;
transition: background 0.12s;
}
.qty-btn:active { background: #232326; }
.qty-num {
font-size: 15px;
font-weight: 600;
min-width: 22px;
text-align: center;
color: #52525b;
}
.qty-num.pos { color: #3b82f6; }

/* CART BAR */
.cart-bar {
position: fixed;
bottom: 0; left: 50%; transform: translateX(-50%);
width: 100%; max-width: 480px;
background: #232326;
border-top: 1px solid rgba(255,255,255,0.12);
padding: 12px 16px;
display: none;
align-items: center;
gap: 12px;
z-index: 200;
}
.cart-bar.vis { display: flex; }
.cart-info { flex: 1; }
.cart-label { font-size: 11px; color: #a1a1aa; }
.cart-count { font-size: 15px; font-weight: 700; color: #fafafa; }

.order-btn {
background: #3b82f6;
color: #fff;
border: none;
border-radius: 10px;
padding: 11px 20px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
font-family: ‘Heebo’, sans-serif;
white-space: nowrap;
}
.order-btn:active { opacity: 0.85; }

/* === DRAFT MODAL === */
.modal-overlay {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(0,0,0,0.75);
z-index: 1000;
display: none;
align-items: flex-end;
justify-content: center;
-webkit-overflow-scrolling: touch;
}
.modal-overlay.vis { display: flex; }

.modal {
background: #232326;
border-radius: 20px 20px 0 0;
padding: 20px 16px calc(32px + env(safe-area-inset-bottom));
width: 100%;
max-width: 480px;
max-height: 85vh;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
position: relative;
z-index: 1001;
}

.modal-handle {
width: 36px; height: 4px;
background: rgba(255,255,255,0.12);
border-radius: 2px;
margin: 0 auto 16px;
}

.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: #a1a1aa; margin-bottom: 14px; }

.sup-draft {
background: #18181b;
border: 1px solid rgba(255,255,255,0.07);
border-radius: 12px;
padding: 14px;
margin-bottom: 12px;
}

.sup-draft-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 10px;
}

.sup-draft-name { font-size: 14px; font-weight: 700; }
.sup-draft-phone { font-size: 12px; color: #3b82f6; }

.draft-text {
font-size: 12px;
color: #a1a1aa;
background: #2c2c30;
border-radius: 8px;
padding: 10px 12px;
white-space: pre-wrap;
line-height: 1.6;
margin-bottom: 10px;
direction: rtl;
}

.copy-btn {
width: 100%;
padding: 10px;
background: #2c2c30;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 8px;
color: #fafafa;
font-size: 13px;
font-weight: 600;
cursor: pointer;
font-family: ‘Heebo’, sans-serif;
}
.copy-btn.copied { background: rgba(34,197,94,0.13); border-color: #22c55e; color: #22c55e; }
.copy-btn:active { opacity: 0.8; }

.modal-close {
width: 100%;
padding: 12px;
background: transparent;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 10px;
color: #a1a1aa;
font-size: 14px;
cursor: pointer;
margin-top: 6px;
font-family: ‘Heebo’, sans-serif;
}

/* === PRICES TAB === */
.price-table-wrap { padding: 0; }

.price-section { margin-bottom: 0; border-bottom: 1px solid rgba(255,255,255,0.07); }

.price-cat-header {
padding: 8px 16px;
font-size: 11px;
font-weight: 700;
color: #52525b;
letter-spacing: 0.8px;
text-transform: uppercase;
background: #232326;
position: sticky;
top: 0;
border-bottom: 1px solid rgba(255,255,255,0.07);
}

.price-row {
padding: 10px 16px;
border-bottom: 1px solid rgba(255,255,255,0.07);
direction: rtl;
}
.price-row:last-child { border-bottom: none; }

.pr-name { font-size: 14px; color: #fafafa; margin-bottom: 3px; font-weight: 500; }
.pr-meta { display: flex; justify-content: space-between; align-items: center; }
.pr-sup { font-size: 12px; color: #52525b; }

.pr-price { font-size: 14px; font-weight: 700; white-space: nowrap; }
.pr-price.best { color: #22c55e; }
.pr-price.high { color: #ef4444; }
.pr-price.mid { color: #f59e0b; }
.pr-price.solo { color: #a1a1aa; }
.pr-unit { font-size: 11px; color: #52525b; font-weight: 400; margin-right: 3px; }

.no-data { padding: 32px 16px; text-align: center; color: #52525b; font-size: 14px; }

/* STATUS BADGE on supplier */
.status-dot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
display: inline-block; margin-left: 6px;
}
.status-open { background: #22c55e; }
.status-late { background: #ef4444; }
.status-off   { background: #52525b; }

/* WEEKLY VIEW */
.week-header {
padding: 12px 16px 6px;
font-size: 13px; font-weight: 700;
color: #a1a1aa; letter-spacing: 0.5px;
border-bottom: 1px solid rgba(255,255,255,0.07);
background: #18181b;
position: sticky; top: 0; z-index: 10;
}
.week-today-header {
background: rgba(59,130,246,0.15);
color: #3b82f6;
border-bottom: 1px solid #3b82f6;
}
.week-day-block { border-bottom: 2px solid rgba(255,255,255,0.12); margin-bottom: 0; }
.week-sup-row {
display: flex; align-items: center; justify-content: space-between;
padding: 10px 16px;
border-bottom: 1px solid rgba(255,255,255,0.07);
cursor: pointer;
}
.week-sup-row:active { background: #2c2c30; }
.week-sup-name { font-size: 14px; font-weight: 500; color: #fafafa; }
.week-sup-meta { font-size: 12px; color: #52525b; margin-top: 2px; }
.week-cutoff-badge {
font-size: 11px; font-weight: 700; padding: 3px 8px;
border-radius: 8px; white-space: nowrap;
}
.badge-open { background: rgba(34,197,94,0.13); color: #22c55e; }
.badge-late { background: rgba(239,68,68,0.12); color: #ef4444; }
.week-empty { padding: 12px 16px; font-size: 13px; color: #52525b; font-style: italic; }

/* Excel export btn */
.export-bar {
padding: 10px 16px;
background: #18181b;
border-bottom: 1px solid rgba(255,255,255,0.07);
}
.export-btn {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
width: 100%;
padding: 10px;
background: #2c2c30;
border: 1px solid rgba(255,255,255,0.12);
border-radius: 10px;
color: #fafafa;
font-size: 13px;
font-weight: 600;
cursor: pointer;
font-family: ‘Heebo’, sans-serif;
}
.export-btn:active { opacity: 0.8; }

/* ── ANOMALIES TAB ── */
.anm-filters { display:flex; gap:6px; padding:10px 16px; overflow-x:auto; scrollbar-width:none;
background:#18181b; position:sticky; top:0; z-index:5; border-bottom:1px solid rgba(255,255,255,0.07); }
.anm-filters::-webkit-scrollbar { display:none; }
.anm-pill { padding:5px 12px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer;
border:1px solid rgba(255,255,255,0.12); background:transparent; color:#a1a1aa;
font-family:“Heebo”,sans-serif; white-space:nowrap; flex-shrink:0; }
.anm-pill.active { background:rgba(59,130,246,0.15); border-color:#3b82f6; color:#3b82f6; }

.anm-card { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.07);
background:#232326; border-right:3px solid #f59e0b; }
.anm-card.high { border-right-color:#ef4444; }
.anm-card.ack  { border-right-color:#52525b; opacity:0.55; }

.anm-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2px; }
.anm-name { font-size:14px; font-weight:600; color:#fafafa; flex:1; padding-left:8px; }
.anm-pct  { font-size:15px; font-weight:800; white-space:nowrap; }
.anm-pct.up { color:#ef4444; }
.anm-pct.dn { color:#3b82f6; }
.anm-meta { font-size:11px; color:#52525b; margin-bottom:10px; }

/* visual bar comparison */
.anm-bars { display:flex; align-items:flex-end; gap:6px; margin-bottom:10px; height:56px; }
.anm-bar-col { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.anm-bar-rect { width:100%; border-radius:4px 4px 0 0; min-height:4px; }
.anm-bar-val  { font-size:12px; font-weight:700; }
.anm-bar-lbl  { font-size:10px; color:#52525b; }

/* sparkline row */
.anm-spark-row { display:flex; gap:4px; align-items:center; margin-bottom:10px; overflow-x:auto; scrollbar-width:none; }
.anm-spark-row::-webkit-scrollbar { display:none; }
.anm-spark-dot { display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0; }
.anm-spark-circle { width:8px; height:8px; border-radius:50%; background:#52525b; }
.anm-spark-circle.curr { background:#ef4444; width:10px; height:10px; }
.anm-spark-circle.curr.dn { background:#3b82f6; }
.anm-spark-price { font-size:10px; color:#52525b; }
.anm-spark-date  { font-size:9px;  color:#52525b; }
.anm-spark-line  { width:16px; height:2px; background:rgba(255,255,255,0.12); flex-shrink:0; align-self:center; margin-bottom:14px; }

/* actions */
.anm-actions { display:flex; gap:8px; }
.anm-btn { flex:1; padding:8px 6px; border-radius:8px; font-size:12px; font-weight:600;
cursor:pointer; border:1px solid rgba(255,255,255,0.12); background:#2c2c30;
color:#a1a1aa; font-family:“Heebo”,sans-serif; text-align:center; }
.anm-btn.wa  { background:rgba(37,211,102,0.12); border-color:rgba(37,211,102,0.4); color:#25d366; }
.anm-btn.ok  { background:rgba(34,197,94,0.13); border-color:#22c55e; color:#22c55e; }
.anm-btn.ack { background:#2c2c30; border-color:rgba(255,255,255,0.12); color:#52525b; }

/* BUDGET TRACKER */
.budget-wrap { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.budget-title { font-size: 11px; font-weight: 700; color: #52525b; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.budget-label { font-size: 13px; color: #a1a1aa; }
.budget-amount { font-size: 13px; font-weight: 700; color: #fafafa; }
.budget-bar-wrap { height: 6px; background: #2c2c30; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
.budget-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.budget-suppliers { display: flex; flex-direction: column; gap: 6px; }
.budget-sup-row { display: flex; align-items: center; gap: 8px; }
.budget-sup-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.budget-sup-name { font-size: 12px; color: #a1a1aa; flex: 1; }
.budget-sup-bar { flex: 2; height: 4px; background: #2c2c30; border-radius: 2px; overflow: hidden; }
.budget-sup-fill { height: 100%; border-radius: 2px; }
.budget-sup-amt { font-size: 12px; font-weight: 600; color: #fafafa; min-width: 60px; text-align: left; }
.budget-month-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.budget-month-btn { background: #2c2c30; border: 1px solid rgba(255,255,255,0.12); color: #a1a1aa; border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; font-family: “Heebo”, sans-serif; }
.budget-month-label { font-size: 14px; font-weight: 600; color: #fafafa; }
.budget-total-big { font-size: 28px; font-weight: 700; color: #fafafa; margin-bottom: 2px; }
.budget-total-sub { font-size: 12px; color: #52525b; margin-bottom: 14px; }

/* HISTORY TAB */
.order-card {
background: #232326;
border-bottom: 1px solid rgba(255,255,255,0.07);
padding: 14px 16px;
}
.order-card-header {
display: flex; justify-content: space-between; align-items: flex-start;
margin-bottom: 8px;
}
.order-card-sup { font-size: 15px; font-weight: 600; color: #fafafa; }
.order-card-date { font-size: 12px; color: #52525b; margin-top: 2px; }
.order-card-items { font-size: 13px; color: #a1a1aa; line-height: 1.6; }
.order-card-item { display: flex; justify-content: space-between; padding: 2px 0; }
.order-card-item-name { color: #fafafa; }
.order-card-item-qty { color: #3b82f6; font-weight: 600; white-space: nowrap; }
.order-status {
font-size: 11px; font-weight: 700; padding: 3px 10px;
border-radius: 10px; white-space: nowrap;
}
.status-sent { background: rgba(59,130,246,0.15); color: #3b82f6; }
.status-received { background: rgba(34,197,94,0.13); color: #22c55e; }
.status-partial { background: rgba(245,158,11,0.13); color: #f59e0b; }
.status-issue { background: rgba(239,68,68,0.12); color: #ef4444; }
.order-actions { display: flex; gap: 8px; margin-top: 10px; }
.order-action-btn {
flex: 1; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 600;
cursor: pointer; border: 1px solid rgba(255,255,255,0.12);
background: #2c2c30; color: #a1a1aa;
font-family: “Heebo”, sans-serif;
}
.order-action-btn.green { background: rgba(34,197,94,0.13); border-color: #22c55e; color: #22c55e; }
.order-action-btn.amber { background: rgba(245,158,11,0.13); border-color: #f59e0b; color: #f59e0b; }
.order-action-btn.red { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #ef4444; }
.confirm-bar {
position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
width: 100%; max-width: 480px;
background: #232326; border-top: 2px solid #3b82f6;
padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
display: none; flex-direction: column; gap: 8px; z-index: 500;
}
.confirm-bar.vis { display: flex; }
.confirm-bar-title { font-size: 13px; font-weight: 700; color: #fafafa; }
.confirm-bar-sub { font-size: 12px; color: #a1a1aa; }
.confirm-bar-btn {
width: 100%; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 700;
cursor: pointer; border: none; font-family: “Heebo”, sans-serif;
background: #3b82f6; color: #fff;
}
.confirm-bar-skip { font-size: 12px; color: #52525b; text-align: center; cursor: pointer; }
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">פסאו <span>גג על הים</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="font-size:11px;color:#52525b;" id="todayDate"></div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('order')" id="tab-order">הזמנות</div>
    <div class="tab" onclick="switchTab('week')" id="tab-week">שבועי</div>
    <div class="tab" onclick="switchTab('history')" id="tab-history">היסטוריה</div>
    <div class="tab" onclick="switchTab('budget')" id="tab-budget">💰</div>
    <div class="tab" onclick="switchTab('anomalies')" id="tab-anomalies">⚠️</div>
    <div class="tab" onclick="switchTab('prices')" id="tab-prices">מחירון</div>
  </div>
</div>

<!-- ORDER TAB -->

<div id="view-order" class="main">
  <div class="search-wrap">
    <input class="search-input" type="text" id="orderSearch" placeholder="חיפוש ספק או מוצר..." oninput="renderOrder()" />
  </div>
  <div class="pills" id="orderPills"></div>

function fmt(n) { return n != null ? '₪' + n.toFixed(2) : '—'; }
function fmtDate(d) { return d ? d.slice(0,7) : ''; }

function getOrderCats() {
  const s = new Set(SUPPLIERS.map(s => s.cat));
  return Array.from(s).sort();
}

function getPriceCats() {
  const s = new Set(PRODUCTS.map(p => p.cat));
  return Array.from(s).sort();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('view-order').style.display = tab === 'order' ? 'block' : 'none';
  document.getElementById('view-week').style.display = tab === 'week' ? 'block' : 'none';
  document.getElementById('view-history').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('view-budget').style.display = tab === 'budget' ? 'block' : 'none';
  document.getElementById('view-anomalies').style.display = tab === 'anomalies' ? 'block' : 'none';
  document.getElementById('view-prices').style.display = tab === 'prices' ? 'block' : 'none';
  document.getElementById('tab-order').className = 'tab' + (tab === 'order' ? ' active' : '');
  document.getElementById('tab-week').className = 'tab' + (tab === 'week' ? ' active' : '');
  document.getElementById('tab-history').className = 'tab' + (tab === 'history' ? ' active' : '');
  document.getElementById('tab-budget').className = 'tab' + (tab === 'budget' ? ' active' : '');
  document.getElementById('tab-anomalies').className = 'tab' + (tab === 'anomalies' ? ' active' : '');
  document.getElementById('tab-prices').className = 'tab' + (tab === 'prices' ? ' active' : '');
  if (tab === 'week') renderWeek();
  if (tab === 'history') renderHistory();
  if (tab === 'budget') renderBudget();
  if (tab === 'anomalies') renderAnomalies();
}

// ═══════════════════════════════════════
// ORDER TAB
// ═══════════════════════════════════════
function renderOrderPills() {
  const cats = getOrderCats();
  let h = `<div class="pill ${orderFilter==='all'?'active':''}" onclick="setOrderFilter('all')">הכל</div>`;
  cats.forEach(c => {
    h += `<div class="pill ${orderFilter===c?'active':''}" onclick="setOrderFilter('${c}')">${c}</div>`;
  });
  document.getElementById('orderPills').innerHTML = h;
}

function setOrderFilter(f) { orderFilter = f; renderOrderPills(); renderOrder(); }

// ═══════════════════════════════════════
// SUPPLIER STATUS
// ═══════════════════════════════════════
const DAY_HE_MAP = {0:'א', 1:'ב', 2:'ג', 3:'ד', 4:'ה', 5:'ו', 6:'ש'};
const DAY_FULL = {0:'ראשון', 1:'שני', 2:'שלישי', 3:'רביעי', 4:'חמישי', 5:'שישי', 6:'שבת'};
const DAYS_ORDER = [0,1,2,3,4,5];

function getSupplierStatus(sup) {
  const now = new Date();
  const todayHe = DAY_HE_MAP[now.getDay()];
  const [ch, cm] = (sup.cutoff || '23:59').split(':').map(Number);
  const cutoffMins = ch * 60 + cm;
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const orderToday = !sup.days || sup.days.includes(todayHe);

  if (!orderToday) return { dot: 'status-off', label: '', cls: '' };
  if (nowMins < cutoffMins) return { dot: 'status-open', label: 'פתוח עד ' + sup.cutoff, cls: 'badge-open' };
  return { dot: 'status-late', label: 'פג תוקף', cls: 'badge-late' };
}

// ═══════════════════════════════════════
// WEEKLY VIEW
// ═══════════════════════════════════════
function renderWeek() {
  const now = new Date();
  const todayNum = now.getDay();
  let html = '';
  DAYS_ORDER.forEach(function(dayNum) {
    const dayHe = DAY_HE_MAP[dayNum];
    const isToday = dayNum === todayNum;
    const arriving = SUPPLIERS.filter(function(s) { return s.delivery && s.delivery.includes(dayHe); });
    const ordering = SUPPLIERS.filter(function(s) { return s.days && s.days.includes(dayHe) && !(s.delivery && s.delivery.includes(dayHe)); });
    if (arriving.length === 0 && ordering.length === 0) return;
    html += '<div class="week-day-block">';
    html += '<div class="week-header ' + (isToday ? 'week-today-header' : '') + '">';
    html += (isToday ? '📍 ' : '') + 'יום ' + DAY_FULL[dayNum] + (isToday ? ' — היום' : '');
    html += '</div>';
    if (arriving.length > 0) {
      html += '<div style="padding:6px 16px 2px;font-size:11px;font-weight:700;color:#22c55e;letter-spacing:0.5px;">📦 מגיע</div>';
      arriving.forEach(function(sup) {
        var prods = PRODUCTS.filter(function(p) { return p.sid === sup.id; });
        var parts = (sup.cutoff || '23:59').split(':');
        var cutoffMins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var nowMins = now.getHours() * 60 + now.getMinutes();
        var badge = '';
        if (isToday) {
          if (nowMins < cutoffMins) badge = '<span class="week-cutoff-badge badge-open">הזמן עד ' + sup.cutoff + '</span>';
          else badge = '<span class="week-cutoff-badge" style="background:#2c2c30;color:#52525b;">הגיע</span>';
        }
        html += '<div class="week-sup-row" onclick="switchTab(\'order\');setTimeout(function(){expandedSups.add(\'' + sup.id + '\');renderOrder();},50)">';
        html += '<div><div class="week-sup-name">' + sup.name + '</div>';
        html += '<div class="week-sup-meta">' + prods.length + ' פריטים · ' + (sup.phone || '') + '</div></div>';
        html += badge + '</div>';
      });
    }
    if (ordering.length > 0) {
      html += '<div style="padding:6px 16px 2px;font-size:11px;font-weight:700;color:#3b82f6;letter-spacing:0.5px;">📋 להזמין היום</div>';
      ordering.forEach(function(sup) {
        var prods = PRODUCTS.filter(function(p) { return p.sid === sup.id; });
        var parts = (sup.cutoff || '23:59').split(':');
        var cutoffMins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var nowMins = now.getHours() * 60 + now.getMinutes();
        var badge = '';
        if (isToday) {
          if (nowMins < cutoffMins) badge = '<span class="week-cutoff-badge badge-open">עד ' + sup.cutoff + '</span>';
          else badge = '<span class="week-cutoff-badge badge-late">פג תוקף</span>';
        } else {
          badge = '<span style="font-size:11px;color:#52525b;">עד ' + sup.cutoff + '</span>';
        }
        html += '<div class="week-sup-row" onclick="switchTab(\'order\');setTimeout(function(){expandedSups.add(\'' + sup.id + '\');renderOrder();},50)">';
        html += '<div><div class="week-sup-name">' + sup.name + '</div>';
        html += '<div class="week-sup-meta">' + prods.length + ' פריטים · ' + (sup.phone || '') + '</div></div>';
        html += badge + '</div>';
      });
    }
    html += '</div>';
  });
  document.getElementById('weekList').innerHTML = html;
}

function renderOrder() {
  const q = document.getElementById('orderSearch').value.trim().toLowerCase();
  let html = '';
  let any = false;
  SUPPLIERS.forEach(sup => {
    if (orderFilter !== 'all' && sup.cat !== orderFilter) return;
    let prods = PRODUCTS.filter(p => p.sid === sup.id);
    if (q) {
      const supMatch = sup.name.toLowerCase().includes(q);
      if (!supMatch) {
        prods = prods.filter(p => p.name.toLowerCase().includes(q) || (p.sku && p.sku.toLowerCase().includes(q)));
        if (!prods.length) return;
      }
    }
    any = true;
    const isOpen = expandedSups.has(sup.id) || (q.length > 0);
    const inCart = prods.filter(p => cart[p.id] > 0).length;
    const daysStr = sup.days ? sup.days.join(' ') : 'לפי צורך';
    const st = getSupplierStatus(sup);
    html += `<div class="supplier-block">
      <div class="supplier-header" onclick="toggleSup('${sup.id}')">
        <div class="sup-left">
          <div class="sup-name"><span class="status-dot ${st.dot}"></span>${sup.name}</div>
          <div class="sup-meta">${sup.phone} &nbsp;·&nbsp; עד ${sup.cutoff} &nbsp;·&nbsp; ${daysStr}</div>
        </div>
        <div class="sup-right">
          ${st.label ? `<span class="week-cutoff-badge ${st.cls}">${st.label}</span>` : ''}
          ${inCart > 0 ? `<span class="badge badge-accent">${inCart}</span>` : ''}
          <span class="chevron ${isOpen?'open':''}">▶</span>
        </div>
      </div>
      <div class="products ${isOpen?'open':''}">`;
    prods.forEach(p => {
      const qty = cart[p.id] || 0;
      const step = p.step || (p.unit === 'ק"ג' ? 0.5 : 1);
      const min = p.min || step;
      const unitLabel = p.unit;
      const minLabel = min === step ? `מינ׳ ${min} ${unitLabel}` : `מינ׳ ${min}`;
      html += `<div class="product-row">
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-sub">${p.cat} · <span style="color:#f59e0b">${minLabel}</span> · קפיצה ${step}</div>
        </div>
        <div class="prod-price">${p.price != null ? fmt(p.price) : '—'}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="chQty('${p.id}',-1,${step},${min})">−</button>
          <span class="qty-num ${qty>0?'pos':''}" id="q${p.id}">${qty > 0 ? qty + ' ' + unitLabel : '0'}</span>
          <button class="qty-btn" onclick="chQty('${p.id}',1,${step},${min})">+</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  if (!any) html = `<div class="no-data">לא נמצאו תוצאות</div>`;
  document.getElementById('orderList').innerHTML = html;
}

function toggleSup(sid) {
  expandedSups.has(sid) ? expandedSups.delete(sid) : expandedSups.add(sid);
  renderOrder();
}

function chQty(pid, d, step, min) {
  step = step || 1; min = min || step;
  const cur = cart[pid] || 0;
  let next;
  if (d > 0) { next = cur === 0 ? min : cur + step; }
  else { next = cur - step; if (next < min) next = 0; }
  next = Math.round(next * 100) / 100;
  if (next <= 0) { delete cart[pid]; next = 0; } else { cart[pid] = next; }
  const p = PRODUCTS.find(x => x.id === pid);
  const unitLabel = p ? p.unit : '';
  const el = document.getElementById('q' + pid);
  if (el) { el.textContent = next > 0 ? next + ' ' + unitLabel : '0'; el.className = 'qty-num' + (next > 0 ? ' pos' : ''); }
  updateCartBar();
}

function updateCartBar() {
  const total = Object.keys(cart).length;
  const bar = document.getElementById('cartBar');
  bar.className = 'cart-bar' + (total > 0 ? ' vis' : '');
  document.getElementById('cartCount').textContent = total + ' מוצרים';
}

function renderPricePills() {
  const cats = getPriceCats();
  let h = `<div class="pill ${priceFilter==='all'?'active':''}" onclick="setPriceFilter('all')">הכל</div>`;
  cats.forEach(c => { h += `<div class="pill ${priceFilter===c?'active':''}" onclick="setPriceFilter('${c}')">${c}</div>`; });
  document.getElementById('pricePills').innerHTML = h;
}
function setPriceFilter(f) { priceFilter = f; renderPricePills(); renderPrices(); }

function renderPrices() {
  const q = document.getElementById('priceSearch').value.trim().toLowerCase();
  const byCat = {};
  PRODUCTS.forEach(p => {
    if (priceFilter !== 'all' && p.cat !== priceFilter) return;
    if (q && !p.name.toLowerCase().includes(q) && !(SUP_MAP[p.sid] && SUP_MAP[p.sid].name.toLowerCase().includes(q))) return;
    if (!byCat[p.cat]) byCat[p.cat] = {};
    const key = p.name + '|' + p.unit;
    if (!byCat[p.cat][key]) byCat[p.cat][key] = [];
    byCat[p.cat][key].push(p);
  });
  const cats = Object.keys(byCat).sort();
  let html = '';
  if (!cats.length) { html = `<div class="no-data">לא נמצאו מוצרים</div>`; }
  else {
    cats.forEach(cat => {
      html += `<div class="price-section"><div class="price-cat-header">${cat}</div>`;
      const products = byCat[cat];
      Object.keys(products).sort().forEach(key => {
        const entries = products[key];
        const prices = entries.map(e => e.price).filter(p => p != null);
        const minP = prices.length ? Math.min(...prices) : null;
        const maxP = prices.length ? Math.max(...prices) : null;
        const hasMulti = entries.length > 1;
        entries.forEach((p, i) => {
          const sup = SUP_MAP[p.sid];
          let priceClass = 'solo';
          if (hasMulti && p.price != null) {
            if (p.price === minP) priceClass = 'best';
            else if (p.price === maxP) priceClass = 'high';
            else priceClass = 'mid';
          }
          html += `<div class="price-row">
            <div class="pr-name">${p.name}</div>
            <div class="pr-meta">
              <span class="pr-sup">${sup ? sup.name : p.sid}</span>
              <span class="pr-price ${priceClass}">${p.price != null ? fmt(p.price) : '—'}<span class="pr-unit"> / ${p.unit}</span></span>
            </div>
          </div>`;
        });
      });
      html += `</div>`;
    });
  }
  document.getElementById('priceList').innerHTML = html;
}

// BUDGET TRACKER
// ═══════════════════════════════════════
var budgetMonth = new Date().getMonth();
var budgetYear = new Date().getFullYear();
var SUP_COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#84cc16','#ec4899','#14b8a6','#8b5cf6','#fb923c','#10b981'];

function renderBudget() {
  var history = [];
  try { history = JSON.parse(localStorage.getItem('paseo-orders') || '[]'); } catch(e) {}
  var monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  var monthStr = budgetYear + '-' + String(budgetMonth + 1).padStart(2, '0');
  var filtered = history.filter(function(o) { return o.date && o.date.startsWith(monthStr); });
  var supTotals = {}; var supCounts = {};
  filtered.forEach(function(o) {
    var cost = 0;
    o.items.forEach(function(item) {
      var prod = PRODUCTS.find(function(p) { return p.name === item.name && p.sid === o.supplier_id; });
      if (prod && prod.price) cost += (prod.price * parseFloat(item.qty || 0));
    });
    if (!supTotals[o.supplier_name]) { supTotals[o.supplier_name] = 0; supCounts[o.supplier_name] = 0; }
    supTotals[o.supplier_name] += cost; supCounts[o.supplier_name]++;
  });
  var totalCost = Object.values(supTotals).reduce(function(a,b){ return a+b; }, 0);
  var totalOrders = filtered.length;
  var supList = Object.keys(supTotals).sort(function(a,b){ return supTotals[b] - supTotals[a]; });
  var maxCost = supList.length ? supTotals[supList[0]] : 1;
  var prevMonth = budgetMonth === 0 ? 11 : budgetMonth - 1;
  var prevYear = budgetMonth === 0 ? budgetYear - 1 : budgetYear;
  var prevStr = prevYear + '-' + String(prevMonth + 1).padStart(2, '0');
  var prevFiltered = history.filter(function(o) { return o.date && o.date.startsWith(prevStr); });
  var prevCost = 0;
  prevFiltered.forEach(function(o) {
    o.items.forEach(function(item) {
      var prod = PRODUCTS.find(function(p) { return p.name === item.name && p.sid === o.supplier_id; });
      if (prod && prod.price) prevCost += (prod.price * parseFloat(item.qty || 0));
    });
  });
  var diff = totalCost - prevCost;
  var diffStr = diff === 0 ? '' : (diff > 0 ? '▲ +₪' : '▼ ₪') + Math.abs(diff).toFixed(0) + ' לעומת חודש קודם';
  var diffColor = diff > 0 ? '#ef4444' : '#22c55e';
  var html = '<div class="budget-wrap">';
  html += '<div class="budget-month-selector"><button class="budget-month-btn" onclick="budgetPrevMonth()">‹</button>';
  html += '<div class="budget-month-label">' + monthNames[budgetMonth] + ' ' + budgetYear + '</div>';
  html += '<button class="budget-month-btn" onclick="budgetNextMonth()">›</button></div>';
  html += '<div class="budget-total-big">₪' + (totalCost > 0 ? totalCost.toFixed(0) : '—') + '</div>';
  html += '<div class="budget-total-sub">' + totalOrders + ' הזמנות';
  if (diffStr) html += ' &nbsp;·&nbsp; <span style="color:' + diffColor + '">' + diffStr + '</span>';
  html += '</div>';
  if (supList.length === 0) {
    html += '<div style="color:#52525b;font-size:13px;padding:20px 0 10px;">אין נתונים לחודש זה עדיין</div>';
  } else {
    html += '<div class="budget-title">פירוט לפי ספק</div><div class="budget-suppliers">';
    supList.forEach(function(name, i) {
      var pct = maxCost > 0 ? (supTotals[name] / maxCost * 100) : 0;
      var color = SUP_COLORS[i % SUP_COLORS.length];
      html += '<div class="budget-sup-row"><div class="budget-sup-dot" style="background:' + color + '"></div>';
      html += '<div class="budget-sup-name">' + name + '</div>';
      html += '<div class="budget-sup-bar"><div class="budget-sup-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
      html += '<div class="budget-sup-amt">₪' + supTotals[name].toFixed(0) + '</div></div>';
    });
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="budget-wrap"><div class="budget-title">ספקים פעילים החודש</div>';
  if (supList.length === 0) { html += '<div style="color:#52525b;font-size:13px;">—</div>'; }
  else { supList.forEach(function(name) { html += '<div class="budget-row"><span class="budget-label">' + name + ' (' + supCounts[name] + ' הזמנות)</span><span class="budget-amount">₪' + supTotals[name].toFixed(0) + '</span></div>'; }); }
  html += '</div>';
  document.getElementById('budgetContent').innerHTML = html;
}
function budgetPrevMonth() { if (budgetMonth === 0) { budgetMonth = 11; budgetYear -= 1; } else budgetMonth -= 1; renderBudget(); }
function budgetNextMonth() {
  var now = new Date();
  if (budgetYear > now.getFullYear() || (budgetYear === now.getFullYear() && budgetMonth >= now.getMonth())) return;
  if (budgetMonth === 11) { budgetMonth = 0; budgetYear++; } else budgetMonth++;
  renderBudget();
}

      h += '<div class="anm-bar-col"><div class="anm-bar-rect" style="height:'+hA+'px;background:rgba(59,130,246,0.15);border:1px dashed #3b82f6"></div><div class="anm-bar-val" style="color:#a1a1aa">₪'+avg+'</div><div class="anm-bar-lbl">ממוצע</div></div>';
      h += '</div>';
      if (sparkHTML) h += '<div class="anm-spark-row">'+sparkHTML+'</div>';
      if (!isAck) {
        h += '<div class="anm-actions">';
        h += '<button class="anm-btn wa" onclick="window.open(\''+waUrl+'\',\'_blank\')">📲 שלח לספק</button>';
        h += '<button class="anm-btn ok" data-pid="'+a.product_id+'" data-ref="'+a.invoice_ref+'" onclick="acknowledgeAnomaly(this)">✓ ידוע</button>';

      } else { h += '<div style="font-size:11px;color:#22c55e;padding:4px 0">✓ אושרה'+(a.ack_note?' — '+a.ack_note:'')+'</div>'; }
      h += '</div>';
    });
  }
  document.getElementById('anomaliesContent').innerHTML = h;
}

function exportEmail() {
  try {
    var q = document.getElementById('priceSearch').value.trim();
    var filter = priceFilter !== 'all' ? ' — ' + priceFilter : '';
    var subject = 'מחירון פסאו גג על הים' + filter;
    var body = 'מחירון פסאו גג על הים' + filter + '\n' + new Date().toLocaleDateString('he-IL') + '\n================================\n\n';
    var byCat = {};
    PRODUCTS.forEach(function(p) {
      if (priceFilter !== 'all' && p.cat !== priceFilter) return;
      if (q && p.name.toLowerCase().indexOf(q.toLowerCase()) === -1) return;
      if (!byCat[p.cat]) byCat[p.cat] = [];
      byCat[p.cat].push(p);
    });
    Object.keys(byCat).sort().forEach(function(cat) {
      body += '[ ' + cat + ' ]\n';
      byCat[cat].forEach(function(p) {
        var sup = SUP_MAP[p.sid];
        var price = p.price != null ? '₪' + p.price.toFixed(2) : '—';
        body += p.name + ' | ' + (sup ? sup.name : '') + ' | ' + price + ' / ' + p.unit + '\n';
      });
      body += '\n';
    });
    var a = document.createElement('a');
    a.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    a.style.display = 'none'; document.body.appendChild(a); a.click();
    setTimeout(function() { document.body.removeChild(a); }, 200);
  } catch(e) { alert('שגיאה: ' + e.message); }
}
